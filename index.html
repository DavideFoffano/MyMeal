<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F3EF;--surface:#FFFFFF;--surface2:#FAF9F6;
  --border:#E8E4DC;--text:#2C2A27;--text-soft:#7A7570;
  --accent:#E8A87C;--prot:#85C1AE;
  --meal-col:#FFF0E6;--meal-pran:#E8F5F0;--meal-cena:#F0EBF8;
  --danger:#E07070;
  --sh-sm:0 2px 8px rgba(0,0,0,0.06);
  --sh-md:0 4px 20px rgba(0,0,0,0.09);
  --sh-lg:0 8px 40px rgba(0,0,0,0.13);
  --r-sm:12px;--r-md:20px;--r-lg:28px;--r-xl:36px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --bottom-nav-h: calc(64px + var(--safe-bottom));
}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input{font-family:'Jost',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:999px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(10px)}}
.fade{animation:fadeIn .3s ease}
.drop{animation:dropIn .18s ease}
.toast-anim{animation:toastIn .25s ease,toastOut .3s ease 1.8s forwards}
button{cursor:pointer;font-family:'Jost',sans-serif}
/* ── Bottom Nav ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--bottom-nav-h);
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-around;
  padding-top:8px;
  padding-bottom:var(--safe-bottom);
  padding-left:var(--safe-left);padding-right:var(--safe-right);
  z-index:50;box-shadow:0 -2px 20px rgba(0,0,0,0.06);
}
.bottom-nav button{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:6px 16px;border:none;background:transparent;
  font-size:10px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;
  color:var(--text-soft);transition:color .15s;min-width:72px;
  -webkit-tap-highlight-color:transparent;
}
.bottom-nav button.active{color:var(--text);}
.bottom-nav button .nav-icon{font-size:22px;transition:transform .15s;}
.bottom-nav button.active .nav-icon{transform:scale(1.15);}
/* ── Top header ── */
.top-header{
  position:sticky;top:0;z-index:40;
  background:rgba(245,243,239,0.92);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  padding-top:var(--safe-top);
  height:calc(56px + var(--safe-top));
}
/* ── Responsive grids ── */
.grid-macro{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.grid-micro4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.grid-micro3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid-micro3-mt{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.grid-stats{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.nav-tabs{display:flex;gap:4px}
@media(max-width:480px){
  .grid-macro{grid-template-columns:repeat(2,1fr);gap:10px}
  .grid-micro4{grid-template-columns:repeat(2,1fr);gap:8px}
  .grid-micro3{grid-template-columns:repeat(3,1fr);gap:8px}
  .grid-micro3-mt{grid-template-columns:repeat(3,1fr);gap:8px}
  .grid-stats{grid-template-columns:1fr 1fr}
  .summary-card{padding:1.2rem!important}
  .summary-kcal{font-size:36px!important}
}
</style>

// ── Storage ───────────────────────────────────────────────────────────────────
const CK='mm_custom',RK='mm_recipes',GK='mm_goal';
function getFoods(){
  const c=JSON.parse(localStorage.getItem(CK)||'[]');
  const r=JSON.parse(localStorage.getItem(RK)||'[]');
  const base=DB.map(f=>{const ov=JSON.parse(localStorage.getItem('mm_ov_'+f.id)||'null');return ov?{...f,...ov}:{...f};});
  return [...base,...c,...r];
}
function saveCustomFood(food){const a=JSON.parse(localStorage.getItem(CK)||'[]');a.push({...food,isCustom:true,id:'CUST_'+Date.now()});localStorage.setItem(CK,JSON.stringify(a));}
function saveRecipe(recipe){const a=JSON.parse(localStorage.getItem(RK)||'[]');a.push({...recipe,isRecipe:true,id:'REC_'+Date.now()});localStorage.setItem(RK,JSON.stringify(a));}
function deleteFood(id){
  if(id.startsWith('CUST_')){localStorage.setItem(CK,JSON.stringify(JSON.parse(localStorage.getItem(CK)||'[]').filter(f=>f.id!==id)));}
  else if(id.startsWith('REC_')){localStorage.setItem(RK,JSON.stringify(JSON.parse(localStorage.getItem(RK)||'[]').filter(f=>f.id!==id)));}
}
function getDiary(date){return JSON.parse(localStorage.getItem('mm_d_'+date)||'{"colazione":[],"pranzo":[],"cena":[]}');}
function saveDiary(date,diary){localStorage.setItem('mm_d_'+date,JSON.stringify(diary));}
function getGoal(){return parseInt(localStorage.getItem(GK)||'2000',10);}
function saveGoal(g){localStorage.setItem(GK,String(g));}

function QtyModal({food,onClose,onAdd}){
  const [qty,setQty]=useState(food.portion||100);
  const ref=useRef(null);
  useEffect(()=>{ref.current?.focus();},[]);
  const portions=[{l:'½ porz.',g:Math.round((food.portion||100)/2)},{l:'1 porz.',g:food.portion||100},{l:'150g',g:150},{l:'200g',g:200}];
  return h(Modal,{onClose},
    h(MHead,{title:'Aggiungi porzione',onClose}),
    h('div',{style:{padding:24}},
      h('div',{style:{fontWeight:600,marginBottom:4}},food.name),
      h('div',{style:{fontSize:13,color:'var(--text-soft)',marginBottom:20}},`${food.kcal} kcal · P:${food.proteins}g · C:${food.carbs}g · G:${food.fats}g (per 100g)`),
      h('input',{ref,type:'number',value:qty,onChange:e=>setQty(Math.max(1,parseInt(e.target.value)||1)),
        style:{...inp,fontSize:24,fontWeight:700,textAlign:'center',padding:14,marginBottom:8}}),

      h('div',{style:{fontSize:'0.7rem',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-soft)',marginBottom:8}},'Porzioni rapide'),
      h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
        portions.map((p,i)=>h('button',{key:i,onClick:()=>setQty(p.g),style:{padding:'6px 14px',borderRadius:999,border:'1.5px solid var(--border)',background:'var(--surface2)',fontSize:12}},`${p.l} (${p.g}g)`))
      )
    ),
    h(MFoot,{onClose,onSave:()=>onAdd(qty),label:'Aggiungi'})
  );
}

// ── RecipeModal ───────────────────────────────────────────────────────────────
function RecipeModal({foods,onClose,onSave}){
  const [name,setName]=useState('');
  const [ings,setIngs]=useState([]);
  const [totalW,setTotalW]=useState('');
  const [manual,setManual]=useState(false);
  const [q,setQ]=useState('');
  const [focused,setFocused]=useState(false);
  const results=q.length>0?foods.filter(f=>f.name.toLowerCase().includes(q.toLowerCase())).slice(0,8):[];
  const sumW=ings.reduce((a,i)=>a+i.weight,0);
  useEffect(()=>{if(!manual)setTotalW(sumW||'');},[sumW,manual]);
  const calcs=useMemo(()=>{
    let kc=0,pr=0,ca=0,fa=0,fi=0;
    ings.forEach(({food:f,weight:w})=>{kc+=f.kcal*w/100;pr+=f.proteins*w/100;ca+=f.carbs*w/100;fa+=f.fats*w/100;fi+=f.fiber*w/100;});
    const fw=typeof totalW==='number'?totalW:sumW;
    const x=fw>0?100/fw:0;
    return{kcal:Math.round(kc*x),proteins:+(pr*x).toFixed(1),carbs:+(ca*x).toFixed(1),fats:+(fa*x).toFixed(1),fiber:+(fi*x).toFixed(1)};
  },[ings,totalW,sumW]);
  const zero={sodium:0,potassium:0,calcium:0,iron:0,vitA:0,vitC:0,vitB1:0,vitB2:0,vitB3:0,vitB6:0,vitB12:0,vitD:0,vitE:0,folate:0};
  const doSave=()=>{
    if(!name.trim()){alert('Inserisci un nome');return;}
    if(!ings.length){alert('Aggiungi almeno un ingrediente');return;}
    const fw=typeof totalW==='number'?totalW:sumW;
    if(fw<=0){alert('Peso totale > 0');return;}
    onSave({name,category:'I miei alimenti',portion:fw,...zero,...calcs,ingredients:ings.map(i=>({foodId:i.food.id,weight:i.weight}))});
  };
  return h(Modal,{onClose},
    h(MHead,{title:'Nuova Ricetta',onClose}),
    h('div',{style:{padding:24,overflowY:'auto'}},
      h('div',{style:{display:'flex',flexDirection:'column',gap:6,marginBottom:20}},
        h('label',{style:{fontSize:'0.72rem',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-soft)'}},'Nome Ricetta *'),
        h('input',{type:'text',value:name,onChange:e=>setName(e.target.value),placeholder:'Es. Pizza Margherita',style:inp})
      ),
      h('span',{style:secLbl},'Ingredienti'),
      h('div',{style:{marginBottom:16}},
        ings.length===0?h('div',{style:{fontSize:13,color:'var(--text-soft)',fontStyle:'italic'}},'Nessun ingrediente'):
        ings.map((ing,idx)=>h('div',{key:idx,style:{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--border)'}},
          h('div',{style:{flex:1,fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},ing.food.name),
          h('input',{type:'number',value:ing.weight,onChange:e=>{const n=[...ings];n[idx].weight=parseInt(e.target.value)||0;setIngs(n);},style:{...inp,width:60,textAlign:'center',padding:'4px 8px'}}),
          h('span',{style:{fontSize:12,color:'var(--text-soft)'}},'g'),
          h('button',{onClick:()=>setIngs(p=>p.filter((_,i)=>i!==idx)),style:{width:28,height:28,borderRadius:'50%',border:'none',background:'var(--bg)',fontSize:12}},'✕')
        ))
      ),
      h('div',{style:{position:'relative',marginBottom:20}},
        h('input',{type:'text',placeholder:'Cerca ingrediente…',value:q,onChange:e=>setQ(e.target.value),onFocus:()=>setFocused(true),onBlur:()=>setTimeout(()=>setFocused(false),200),style:{...inp,paddingRight:36}}),
        h('span',{style:{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}},'🔍'),
        focused&&q.length>0&&h('div',{style:{position:'absolute',left:0,right:0,top:'calc(100% + 4px)',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--r-md)',boxShadow:'var(--sh-lg)',maxHeight:200,overflowY:'auto',zIndex:100}},
          results.length===0?h('div',{style:{padding:16,textAlign:'center',color:'var(--text-soft)',fontSize:13}},'Nessun risultato'):
          results.map(f=>h('div',{key:f.id,onClick:()=>{setIngs(p=>[...p,{food:f,weight:f.portion||100}]);setQ('');},style:{padding:'10px 16px',cursor:'pointer',display:'flex',justifyContent:'space-between',fontSize:13,borderBottom:'1px solid var(--border)'},onMouseOver:e=>e.currentTarget.style.background='var(--bg)',onMouseOut:e=>e.currentTarget.style.background=''},
            h('span',null,f.name),h('span',{style:{color:'var(--text-soft)',fontWeight:600}},f.kcal+' kcal')
          ))
        )
      ),
      h('div',{style:{display:'flex',alignItems:'flex-end',gap:16,marginBottom:16}},
        h('div',{style:{flex:1}},
          h('label',{style:{...secLbl,margin:'0 0 6px'}},'Peso Totale (g) *'),
          h('input',{type:'number',value:totalW,onChange:e=>{setTotalW(parseInt(e.target.value)||'');setManual(true);},style:inp})
        ),
        h('div',{style:{fontSize:13,color:'var(--text-soft)',paddingBottom:8}},`Somma: ${sumW}g`)
      ),
      h('div',{style:{background:'var(--surface2)',borderRadius:'var(--r-sm)',padding:14,fontSize:13}},
        `Valori per 100g: ${calcs.kcal} kcal · P:${calcs.proteins}g · C:${calcs.carbs}g · G:${calcs.fats}g`)
    ),
    h(MFoot,{onClose,onSave:doSave,label:'Salva Ricetta'})
  );
}

// ── MacroPill / MicroPill ─────────────────────────────────────────────────────
function MacroPill({label,val,color}){

function MicroPill({icon,label,val,unit}){

}

// ── DiaryPage ─────────────────────────────────────────────────────────────────
function DiaryPage({diary,foods,goal,setGoal,onUpdateQty,onRemoveItem,onSearchSelect}){
  const [vitOpen,setVitOpen]=useState(false);
  let kcal=0,prot=0,carb=0,fat=0,fiber=0,sod=0,pot=0,cal=0,iro=0;
  let vA=0,vC=0,vB1=0,vB2=0,vB3=0,vB6=0,vB12=0,vD=0,vE=0,fol=0;
  const mt={colazione:0,pranzo:0,cena:0};
  ['colazione','pranzo','cena'].forEach(meal=>{
    (diary[meal]||[]).forEach(e=>{
      const f=foods.find(x=>x.id===e.foodId);if(!f)return;
      const q=e.qty;
      kcal+=f.kcal*q/100;mt[meal]+=f.kcal*q/100;
      prot+=f.proteins*q/100;carb+=f.carbs*q/100;fat+=f.fats*q/100;fiber+=f.fiber*q/100;
      sod+=(f.sodium||0)*q/100;pot+=(f.potassium||0)*q/100;cal+=(f.calcium||0)*q/100;iro+=(f.iron||0)*q/100;
      vA+=(f.vitA||0)*q/100;vC+=(f.vitC||0)*q/100;vB1+=(f.vitB1||0)*q/100;vB2+=(f.vitB2||0)*q/100;
      vB3+=(f.vitB3||0)*q/100;vB6+=(f.vitB6||0)*q/100;vB12+=(f.vitB12||0)*q/100;vD+=(f.vitD||0)*q/100;vE+=(f.vitE||0)*q/100;fol+=(f.folate||0)*q/100;
    });
  });
  const rem=goal-Math.round(kcal);
  const pct=Math.min((kcal/goal)*100,100);
  const over=kcal>goal;
  return h('div',null,
    // Summary card
    h('div',{className:'summary-card',style:{background:'var(--surface)',borderRadius:'var(--r-xl)',boxShadow:'var(--sh-md)',padding:'2rem',marginBottom:24,position:'relative',overflow:'hidden'}},
      h('div',{style:{position:'absolute',top:-40,right:-40,width:160,height:160,borderRadius:'50%',background:'radial-gradient(circle,rgba(232,168,124,0.15) 0%,transparent 70%)',pointerEvents:'none'}}),
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24,flexWrap:'wrap',gap:12}},
        h('div',{style:{fontSize:'0.72rem',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-soft)'}},'Riepilogo Giornaliero'),
        h('div',{style:{display:'flex',alignItems:'center',gap:8}},
          h('span',{style:{fontSize:12,color:'var(--text-soft)'}},'Obiettivo:'),
          h('input',{type:'number',value:goal,onChange:e=>setGoal(parseInt(e.target.value)||2000),style:{width:80,padding:'4px 10px',borderRadius:999,border:'1.5px solid var(--border)',fontFamily:"'Jost',sans-serif",fontSize:12,textAlign:'center',background:'var(--surface2)',outline:'none'}}),
          h('span',{style:{fontSize:12,color:'var(--text-soft)'}},'kcal')
        )
      ),
      h('div',{className:'summary-kcal',style:{fontSize:48,fontWeight:700,lineHeight:1,marginBottom:6}},Math.round(kcal),' ',h('span',{style:{fontSize:16,fontWeight:300,color:'var(--text-soft)'}},'kcal')),
      h('div',{style:{fontSize:13,color:'var(--text-soft)',marginBottom:20}},
        'Obiettivo: ',h('strong',{style:{color:'var(--text)'}},goal+' kcal'),' — '+(rem>=0?'Rimanenti':'Surplus')+': ',h('strong',{style:{color:'var(--text)'}},Math.abs(rem)+' kcal')
      ),
      h('div',{style:{background:'var(--bg)',borderRadius:999,height:8,marginBottom:24,overflow:'hidden'}},
        h('div',{style:{height:'100%',borderRadius:999,width:pct+'%',transition:'width .5s ease',background:over?'linear-gradient(90deg,#E07070,#E05050)':'linear-gradient(90deg,var(--accent),#F0A060)'}})
      ),
      h('div',{className:'grid-macro'},
        h(MacroPill,{label:'Proteine',val:prot,color:'var(--prot)'}),
        h(MacroPill,{label:'Carboidrati',val:carb,color:'#C09020'}),
        h(MacroPill,{label:'Grassi',val:fat,color:'#9060B0'}),
        h(MacroPill,{label:'Fibre',val:fiber,color:'#508050'})
      ),
      h('div',{style:{fontSize:'0.65rem',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text-soft)',marginBottom:10}},'⚗️ Minerali'),
      h('div',{className:'grid-micro4'},
        h(MicroPill,{icon:'🧂',label:'Sodio',val:sod,unit:'mg'}),h(MicroPill,{icon:'🍌',label:'Potassio',val:pot,unit:'mg'}),
        h(MicroPill,{icon:'🦴',label:'Calcio',val:cal,unit:'mg'}),h(MicroPill,{icon:'🩸',label:'Ferro',val:iro,unit:'mg'})
      ),
      h('div',{onClick:()=>setVitOpen(v=>!v),style:{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',marginBottom:10}},
        h('span',{style:{fontSize:'0.65rem',fontWeight:700,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text-soft)'}},'💊 Vitamine'),
        h('button',{style:{fontSize:11,fontWeight:600,color:'var(--text-soft)',background:'var(--bg)',border:'1.5px solid var(--border)',borderRadius:999,padding:'4px 12px',cursor:'pointer',fontFamily:"'Jost',sans-serif"}},'Altre '+(vitOpen?'▲':'▼'))
      ),
      h('div',{className:'grid-micro3'},
        h(MicroPill,{icon:'🍊',label:'Vit. C',val:vC,unit:'mg'}),h(MicroPill,{icon:'🥕',label:'Vit. A',val:vA,unit:'µg'}),h(MicroPill,{icon:'🌻',label:'Vit. E',val:vE,unit:'mg'})
      ),
      vitOpen&&h('div',{className:'grid-micro3-mt'},
        h(MicroPill,{icon:'🌾',label:'B1 Tiamina',val:vB1,unit:'mg'}),h(MicroPill,{icon:'🥛',label:'B2 Riboflavina',val:vB2,unit:'mg'}),
        h(MicroPill,{icon:'🥩',label:'B3 Niacina',val:vB3,unit:'mg'}),h(MicroPill,{icon:'🐟',label:'B6',val:vB6,unit:'mg'}),
        h(MicroPill,{icon:'🥚',label:'B12',val:vB12,unit:'µg'}),h(MicroPill,{icon:'☀️',label:'Vit. D',val:vD,unit:'µg'}),
        h(MicroPill,{icon:'🥦',label:'Folati',val:fol,unit:'µg'})
      )
    ),
    [{key:'colazione',title:'Colazione',icon:'☀️',bg:'var(--meal-col)'},{key:'pranzo',title:'Pranzo',icon:'🌿',bg:'var(--meal-pran)'},{key:'cena',title:'Cena',icon:'🌙',bg:'var(--meal-cena)'}].map(({key,title,icon,bg})=>
      h(MealSection,{key,title,icon,bg,items:diary[key]||[],foods,totalKcal:mt[key],
        onUpdateQty:(idx,qty)=>onUpdateQty(key,idx,qty),
        onRemoveItem:idx=>onRemoveItem(key,idx),
        onSearchSelect:food=>onSearchSelect(food,key)})
    )
  );
}

// ── StatsPage ─────────────────────────────────────────────────────────────────
function StatsPage({currentDate,goal,foods}){
  const days=useMemo(()=>{
    const r=[];
    for(let i=6;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const ds=d.toISOString().slice(0,10);
      const diary=getDiary(ds);
      let kc=0,pr=0,ca=0,fa=0;
      ['colazione','pranzo','cena'].forEach(m=>(diary[m]||[]).forEach(e=>{const f=foods.find(x=>x.id===e.foodId);if(!f)return;kc+=f.kcal*e.qty/100;pr+=f.proteins*e.qty/100;ca+=f.carbs*e.qty/100;fa+=f.fats*e.qty/100;}));
      r.push({date:ds,label:d.toLocaleDateString('it-IT',{weekday:'short',day:'numeric'}),kcal:Math.round(kc),prot:+pr.toFixed(1),carb:+ca.toFixed(1),fat:+fa.toFixed(1)});
    }
    return r;
  },[foods]);
  const logged=days.filter(d=>d.kcal>0);
  const avgK=logged.length?Math.round(logged.reduce((s,d)=>s+d.kcal,0)/logged.length):0;
  const avgP=logged.length?(logged.reduce((s,d)=>s+d.prot,0)/logged.length).toFixed(1):0;
  const best=logged.length?logged.reduce((a,b)=>Math.abs(b.kcal-goal)<Math.abs(a.kcal-goal)?b:a):null;
  const maxK=Math.max(...days.map(d=>d.kcal),1);
  const cards=[{t:'Media Calorica',v:avgK||'—',s:'kcal / giorno'},{t:'Giorni Registrati',v:logged.length,s:'ultimi 7 giorni'},{t:'Miglior Giorno',v:best?best.kcal+' kcal':'—',s:best?best.label:'—'},{t:'Media Proteine',v:avgP||'—',s:'g / giorno'}];
  const tt={contentStyle:{fontFamily:"'Jost',sans-serif",borderRadius:12,border:'1px solid var(--border)'}};
  return h('div',null,
    h('div',{style:{marginBottom:28}},
      h('h1',{style:{fontSize:24,fontWeight:700,marginBottom:4}},'Andamento'),
      h('p',{style:{fontSize:13,color:'var(--text-soft)'}},'Ultimi 7 giorni')
    ),
    h('div',{className:'grid-stats'},
      cards.map((c,i)=>h('div',{key:i,style:{background:'var(--surface)',borderRadius:'var(--r-lg)',padding:24,boxShadow:'var(--sh-sm)',border:'1px solid var(--border)'}},
        h('div',{style:{fontSize:'0.7rem',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-soft)',marginBottom:10}},c.t),
        h('div',{style:{fontSize:28,fontWeight:700}},c.v),
        h('div',{style:{fontSize:12,color:'var(--text-soft)',marginTop:2}},c.s)
      ))
    ),
    h('div',{style:{background:'var(--surface)',borderRadius:'var(--r-lg)',padding:28,boxShadow:'var(--sh-sm)',border:'1px solid var(--border)',marginBottom:20}},
      h('div',{style:{fontSize:'0.7rem',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-soft)',marginBottom:20}},'Calorie giornaliere'),
      h(ResponsiveContainer,{width:'100%',height:220},
        h(BarChart,{data:days,margin:{top:5,right:10,left:-20,bottom:0}},
          h(CartesianGrid,{strokeDasharray:'3 3',stroke:'rgba(0,0,0,0.05)',vertical:false}),
          h(XAxis,{dataKey:'label',tick:{fontSize:11,fontFamily:'Jost'},axisLine:false,tickLine:false}),
          h(YAxis,{tick:{fontSize:11,fontFamily:'Jost'},axisLine:false,tickLine:false}),
          h(Tooltip,tt),
          h(ReferenceLine,{y:goal,stroke:'rgba(44,42,39,0.25)',strokeDasharray:'4 4'}),
          h(Bar,{dataKey:'kcal',fill:'rgba(232,168,124,0.85)',radius:[6,6,0,0],name:'kcal'})
        )
      )
    ),
    h('div',{style:{background:'var(--surface)',borderRadius:'var(--r-lg)',padding:28,boxShadow:'var(--sh-sm)',border:'1px solid var(--border)',marginBottom:20}},
      h('div',{style:{fontSize:'0.7rem',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-soft)',marginBottom:20}},'Macronutrienti (g)'),
      h(ResponsiveContainer,{width:'100%',height:220},
        h(LineChart,{data:days,margin:{top:5,right:10,left:-20,bottom:0}},
          h(CartesianGrid,{strokeDasharray:'3 3',stroke:'rgba(0,0,0,0.05)',vertical:false}),
          h(XAxis,{dataKey:'label',tick:{fontSize:11,fontFamily:'Jost'},axisLine:false,tickLine:false}),
          h(YAxis,{tick:{fontSize:11,fontFamily:'Jost'},axisLine:false,tickLine:false}),
          h(Tooltip,tt),
          h(Legend,{iconType:'circle',iconSize:8,wrapperStyle:{fontSize:11,fontFamily:'Jost'}}),
          h(Line,{type:'monotone',dataKey:'prot',stroke:'#85C1AE',strokeWidth:2,dot:{r:3},name:'Proteine'}),
          h(Line,{type:'monotone',dataKey:'carb',stroke:'#F0C987',strokeWidth:2,dot:{r:3},name:'Carboidrati'}),
          h(Line,{type:'monotone',dataKey:'fat',stroke:'#C9A9D4',strokeWidth:2,dot:{r:3},name:'Grassi'})
        )
      )
    ),
    h('div',{style:{background:'var(--surface)',borderRadius:'var(--r-lg)',padding:28,boxShadow:'var(--sh-sm)',border:'1px solid var(--border)'}},
      h('div',{style:{fontSize:'0.7rem',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-soft)',marginBottom:16}},'Calorie per giorno'),
      days.map(d=>h('div',{key:d.date,style:{display:'flex',alignItems:'center',gap:12,padding:'8px 0',borderBottom:'1px solid var(--border)'}},
        h('div',{style:{fontSize:12,fontWeight:600,width:36,flexShrink:0}},d.label.slice(0,3)),
        h('div',{style:{flex:1,background:'var(--bg)',borderRadius:999,height:6,overflow:'hidden'}},
          h('div',{style:{height:'100%',borderRadius:999,width:(d.kcal?(d.kcal/maxK*100):0)+'%',background:'linear-gradient(90deg,var(--accent),#F0A060)',transition:'width .6s ease'}})
        ),
        h('div',{style:{fontSize:12,fontWeight:700,minWidth:55,textAlign:'right',color:d.date===currentDate?'var(--text)':'var(--text-soft)'}},d.kcal||'—')
      ))
    )
  );
}

// ── DatabasePage ──────────────────────────────────────────────────────────────
const PG=20;
function DatabasePage({foods,onEdit,onAddCustom,onAddRecipe,onDelete}){
  const [q,setQ]=useState('');
  const [cat,setCat]=useState('Tutti');
  const [page,setPage]=useState(0);
  const cats=useMemo(()=>{const s=new Set(foods.map(f=>f.category));return['Tutti','I miei alimenti',...[...s].filter(c=>c!=='I miei alimenti').sort((a,b)=>a.localeCompare(b,'it'))];}, [foods]);
  const filtered=useMemo(()=>foods.filter(f=>{
    if(cat==='I miei alimenti'&&!f.isCustom&&!f.isRecipe)return false;
    if(cat!=='Tutti'&&cat!=='I miei alimenti'&&f.category!==cat)return false;
    if(q&&!f.name.toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  }),[foods,cat,q]);
  const totalPg=Math.ceil(filtered.length/PG);
  const curr=filtered.slice(page*PG,(page+1)*PG);
  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:24,flexWrap:'wrap',gap:12}},
      h('div',null,
        h('h1',{style:{fontSize:24,fontWeight:700,marginBottom:4}},'Database Alimenti'),
        h('p',{style:{fontSize:13,color:'var(--text-soft)'}},'Banca Dati CREA + alimenti personalizzati')
      ),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{onClick:onAddCustom,style:{...btn,background:'var(--text)',color:'#fff',boxShadow:'var(--sh-sm)'}},'+ Alimento'),
        h('button',{onClick:onAddRecipe,style:{...btn,background:'var(--accent)',color:'var(--text)',boxShadow:'var(--sh-sm)'}},'+ Ricetta')
      )
    ),
    h('div',{style:{position:'relative',marginBottom:16}},
      h('input',{type:'text',placeholder:'Cerca nel database…',value:q,onChange:e=>{setQ(e.target.value);setPage(0);},style:{...inp,padding:'12px 40px 12px 16px',borderRadius:'var(--r-md)',boxShadow:'var(--sh-sm)'}}),
      h('span',{style:{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',pointerEvents:'none'}},'🔍')
    ),
    h('div',{style:{display:'flex',flexWrap:'wrap',gap:8,marginBottom:16}},
      cats.map(c=>h('button',{key:c,onClick:()=>{setCat(c);setPage(0);},style:{padding:'6px 14px',borderRadius:999,border:'1.5px solid',fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:500,cursor:'pointer',background:cat===c?'var(--text)':'var(--surface)',color:cat===c?'#fff':'var(--text-soft)',borderColor:cat===c?'var(--text)':'var(--border)'}},c))
    ),
    h('div',{style:{background:'var(--surface)',borderRadius:'var(--r-lg)',boxShadow:'var(--sh-sm)',border:'1px solid var(--border)',overflow:'hidden'}},
      h('div',{style:{overflowX:'auto'}},
      h('table',{style:{width:'100%',minWidth:560,borderCollapse:'collapse',textAlign:'left'}},
        h('thead',null,h('tr',null,
          ['Alimento','Categoria','kcal','P','C','G',''].map((hd,i)=>h('th',{key:i,style:{padding:'12px 16px',fontSize:'0.7rem',fontWeight:600,letterSpacing:'0.08em',textTransform:'uppercase',color:'var(--text-soft)',background:'var(--surface2)',borderBottom:'1px solid var(--border)',textAlign:i>=2&&i<=5?'right':'left'}},hd))
        )),
        h('tbody',null,
          curr.length===0?h('tr',null,h('td',{colSpan:7,style:{padding:24,textAlign:'center',color:'var(--text-soft)',fontSize:13}},'Nessun risultato')):
          curr.map(f=>h('tr',{key:f.id,style:{borderBottom:'1px solid var(--border)'},onMouseOver:e=>e.currentTarget.style.background='var(--bg)',onMouseOut:e=>e.currentTarget.style.background=''},
            h('td',{style:{padding:'12px 16px',fontSize:13,fontWeight:500,maxWidth:200}},
              h('span',{style:{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}},f.name),
              f.isCustom&&h('span',{style:{fontSize:'0.6rem',background:'var(--accent)',color:'#fff',padding:'2px 6px',borderRadius:4}},'Custom'),
              f.isRecipe&&h('span',{style:{fontSize:'0.6rem',background:'var(--text)',color:'#fff',padding:'2px 6px',borderRadius:4}},'Ricetta')
            ),
            h('td',{style:{padding:'12px 16px',fontSize:12,color:'var(--text-soft)'}},f.category),
            h('td',{style:{padding:'12px 16px',fontSize:13,fontWeight:600,textAlign:'right'}},f.kcal),
            h('td',{style:{padding:'12px 16px',fontSize:13,textAlign:'right'}},f.proteins),
            h('td',{style:{padding:'12px 16px',fontSize:13,textAlign:'right'}},f.carbs),
            h('td',{style:{padding:'12px 16px',fontSize:13,textAlign:'right'}},f.fats),
            h('td',{style:{padding:'12px 16px',textAlign:'right',whiteSpace:'nowrap'}},
              h('button',{onClick:()=>onEdit(f),style:{padding:'4px 12px',borderRadius:999,border:'1.5px solid var(--border)',fontSize:12,fontWeight:600,color:'var(--text-soft)',background:'transparent',cursor:'pointer',marginRight:6,fontFamily:"'Jost',sans-serif"}},'Modifica'),
              (f.isCustom||f.isRecipe)&&h('button',{onClick:()=>onDelete(f.id),style:{padding:'4px 12px',borderRadius:999,border:'1.5px solid var(--border)',fontSize:12,fontWeight:600,color:'var(--danger)',background:'transparent',cursor:'pointer',fontFamily:"'Jost',sans-serif"}},'Elimina')
            )
          ))
        )
      ) // end overflowX wrapper
      ),
      totalPg>1&&h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:12,padding:16,background:'var(--surface2)',borderTop:'1px solid var(--border)'}},
        h('button',{onClick:()=>setPage(p=>Math.max(0,p-1)),disabled:page===0,style:{...btn,padding:'6px 14px',background:'var(--surface)',border:'1.5px solid var(--border)',color:'var(--text-soft)',opacity:page===0?0.4:1}},'‹'),
        h('span',{style:{fontSize:13,color:'var(--text-soft)'}},`Pagina ${page+1} di ${totalPg}`),
        h('button',{onClick:()=>setPage(p=>Math.min(p+1,totalPg-1)),disabled:page>=totalPg-1,style:{...btn,padding:'6px 14px',background:'var(--surface)',border:'1.5px solid var(--border)',color:'var(--text-soft)',opacity:page>=totalPg-1?0.4:1}},'›')
      )
    )
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const today=new Date().toISOString().slice(0,10);
  const [tab,setTab]=useState('diary');
  const [date,setDate]=useState(today);
  const [diary,setDiary]=useState(()=>getDiary(today));
  const [goal,setGoalState]=useState(()=>getGoal());
  const [foods,setFoods]=useState(()=>getFoods());
  const [qtyM,setQtyM]=useState(null);
  const [editM,setEditM]=useState(null);
  const [custM,setCustM]=useState(false);
  const [recM,setRecM]=useState(false);
  const [toast,setToast]=useState(null);

  useEffect(()=>{setDiary(getDiary(date));},[date]);
  useEffect(()=>{saveDiary(date,diary);},[diary,date]);

  const rf=()=>setFoods(getFoods());
  const showT=msg=>{setToast(msg);setTimeout(()=>setToast(null),2200);};
  const setGoal=v=>{setGoalState(v);saveGoal(v);};
  const handleSelect=(food,meal)=>setQtyM({food,meal});
  const handleAdd=qty=>{
    const{food,meal}=qtyM;
    setDiary(p=>({...p,[meal]:[...(p[meal]||[]),{foodId:food.id,qty}]}));
    showT(`✓ ${food.name} aggiunto`);setQtyM(null);
  };
  const updQty=(meal,idx,qty)=>setDiary(p=>{const m=[...p[meal]];m[idx]={...m[idx],qty};return{...p,[meal]:m};});
  const remItem=(meal,idx)=>setDiary(p=>{const m=[...p[meal]];m.splice(idx,1);return{...p,[meal]:m};});

  const tabs=[
    {id:'diary',label:'Diario',icon:'📋'},
    {id:'stats',label:'Grafici',icon:'📊'},
    {id:'database',label:'Database',icon:'🥗'}
  ];

  return h('div',{style:{minHeight:'100vh',background:'var(--bg)',color:'var(--text)',fontFamily:"'Jost',sans-serif",paddingBottom:'var(--bottom-nav-h)'}},
    h('header',{className:'top-header'},
      h('div',{style:{fontWeight:700,fontSize:18,display:'flex',alignItems:'center',gap:8}},
        h('span',{style:{width:9,height:9,borderRadius:'50%',background:'var(--accent)',display:'inline-block',boxShadow:'0 0 0 3px rgba(232,168,124,0.25)'}}),
        'My',h('span',{style:{fontWeight:300,color:'var(--text-soft)'}},'Meal')
      ),
      h('input',{type:'date',value:date,max:today,onChange:e=>setDate(e.target.value),
        style:{border:'1.5px solid var(--border)',background:'var(--surface2)',color:'var(--text)',fontFamily:"'Jost',sans-serif",fontSize:13,cursor:'pointer',outline:'none',borderRadius:999,padding:'5px 12px'}})
    ),
    h('main',{className:'fade',style:{maxWidth:900,margin:'0 auto',padding:'20px 16px'}},
      tab==='diary'&&h(DiaryPage,{diary,foods,goal,setGoal,onUpdateQty:updQty,onRemoveItem:remItem,onSearchSelect:handleSelect}),
      tab==='stats'&&h(StatsPage,{currentDate:date,goal,foods}),
      tab==='database'&&h(DatabasePage,{foods,onEdit:setEditM,onAddCustom:()=>setCustM(true),onAddRecipe:()=>setRecM(true),
        onDelete:id=>{if(window.confirm('Eliminare?')){deleteFood(id);rf();showT('Eliminato');}}})
    ),
    h('nav',{className:'bottom-nav'},
      tabs.map(t=>h('button',{key:t.id,className:tab===t.id?'active':'',onClick:()=>setTab(t.id)},
        h('span',{className:'nav-icon'},t.icon),
        t.label
      ))
    ),
    qtyM&&h(QtyModal,{food:qtyM.food,onClose:()=>setQtyM(null),onAdd:handleAdd}),
    editM&&h(EditModal,{food:editM,onClose:()=>setEditM(null),
      onSave:ov=>{localStorage.setItem('mm_ov_'+editM.id,JSON.stringify(ov));rf();setEditM(null);showT('✓ Aggiornato');}}),
    custM&&h(CustomFoodModal,{onClose:()=>setCustM(false),
      onSave:food=>{saveCustomFood(food);rf();setCustM(false);showT('✓ Alimento creato');}}),
    recM&&h(RecipeModal,{foods,onClose:()=>setRecM(false),
      onSave:recipe=>{saveRecipe(recipe);rf();setRecM(false);showT('✓ Ricetta creata');}}),
    toast&&h(Toast,{msg:toast})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>

<!-- ── PWA: Icon + Manifest ───────────────────────────────────────────────── -->
<script>
(function(){
  // Generate a real PNG icon via Canvas so Android/Chrome shows it properly
  function makeIcon(size){
    const c=document.createElement('canvas');
    c.width=c.height=size;
    const ctx=c.getContext('2d');
    const r=size*0.22; // corner radius
    // Background
    ctx.beginPath();
    ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
    const bg=ctx.createLinearGradient(0,0,size,size);
    bg.addColorStop(0,'#F5F3EF');bg.addColorStop(1,'#EDE9E0');
    ctx.fillStyle=bg;ctx.fill();
    // Glow circle
    const grd=ctx.createRadialGradient(size*.5,size*.44,0,size*.5,size*.44,size*.38);
    grd.addColorStop(0,'rgba(232,168,124,0.45)');
    grd.addColorStop(1,'rgba(232,168,124,0)');
    ctx.fillStyle=grd;ctx.fillRect(0,0,size,size);
    // Fork & knife icon
    const s=size/512;
    ctx.save();ctx.translate(size*.5,size*.52);ctx.scale(s,s);
    // Plate
    ctx.beginPath();ctx.arc(0,30,120,0,Math.PI*2);
    ctx.fillStyle='rgba(232,168,124,0.25)';ctx.fill();
    ctx.beginPath();ctx.arc(0,30,120,0,Math.PI*2);
    ctx.strokeStyle='#E8A87C';ctx.lineWidth=18;ctx.stroke();
    // Fork
    ctx.strokeStyle='#C8804C';ctx.lineWidth=16;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-60,-100);ctx.lineTo(-60,80);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-80,-100);ctx.lineTo(-80,-30);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-40,-100);ctx.lineTo(-40,-30);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-80,-30);ctx.quadraticCurveTo(-60,-10,-40,-30);ctx.stroke();
    // Knife
    ctx.beginPath();ctx.moveTo(60,-100);ctx.lineTo(60,80);ctx.stroke();
    ctx.beginPath();ctx.moveTo(60,-100);ctx.quadraticCurveTo(90,-60,60,-20);ctx.stroke();
    ctx.restore();
    return c.toDataURL('image/png');
  }
  const icon512=makeIcon(512);
  const icon192=makeIcon(192);
  // Set favicon and apple icon
  document.getElementById('pwa-favicon-link').href=icon192;
  document.getElementById('pwa-icon-link').href=icon512;
  // Build manifest with real PNG icons
  const manifest={
    name:"MyMeal — Diario Alimentare",
    short_name:"MyMeal",
    description:"Traccia calorie, macronutrienti e micronutrienti ogni giorno",
    start_url:"./",
    display:"standalone",
    display_override:["standalone","minimal-ui"],
    background_color:"#F5F3EF",
    theme_color:"#E8A87C",
    orientation:"portrait-primary",
    categories:["health","fitness","food"],
    icons:[
      {src:icon192,sizes:"192x192",type:"image/png",purpose:"any"},
      {src:icon512,sizes:"512x512",type:"image/png",purpose:"any"},
      {src:icon512,sizes:"512x512",type:"image/png",purpose:"maskable"}
    ]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  const link=document.createElement('link');
  link.rel='manifest';link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
})();
</script>

<!-- ── PWA: Service Worker ────────────────────────────────────────────────── -->
<script>
(function(){
  if(!('serviceWorker' in navigator)) return;
  const CACHE='mymeal-v1';
  const ASSETS=[
    'https://unpkg.com/react@18.2.0/umd/react.production.min.js',
    'https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js',
    'https://unpkg.com/prop-types@15.8.1/prop-types.min.js',
    'https://unpkg.com/recharts@2.12.7/umd/Recharts.js'
  ];
  const swCode=`
const CACHE='${CACHE}';
const ASSETS=${JSON.stringify(ASSETS)};
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS).catch(()=>{})).then(()=>self.skipWaiting()));
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
});
self.addEventListener('fetch',e=>{
  const url=e.request.url;
  if(ASSETS.includes(url)||url.startsWith('https://fonts.gstatic.com')){
    e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const c=res.clone();caches.open(CACHE).then(cache=>cache.put(e.request,c));return res;})));
    return;
  }
  if(e.request.mode==='navigate'){
    e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
    return;
  }
  e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
});
`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob),{scope:'./'})
    .then(reg=>{
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            window._swUpdateReady=true;
          }
        });
      });
    }).catch(()=>{});
})();
</script>

<!-- ── PWA: Install Prompt ────────────────────────────────────────────────── -->
<script>
(function(){
  let deferredPrompt=null,bannerEl=null;
  function makeBanner(html){
    if(bannerEl||localStorage.getItem('mm_pwa_dismissed'))return;
    bannerEl=document.createElement('div');
    bannerEl.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(130px);background:#2C2A27;color:#fff;border-radius:20px;padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 40px rgba(0,0,0,0.28);z-index:3000;font-family:Jost,sans-serif;font-size:14px;max-width:370px;width:calc(100% - 40px);transition:transform .4s cubic-bezier(.34,1.56,.64,1)';
    bannerEl.innerHTML=html;
    document.body.appendChild(bannerEl);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{bannerEl.style.transform='translateX(-50%) translateY(0)';}));
    bannerEl.querySelector('#pwa-x').onclick=dismiss;
  }
  function dismiss(){
    if(!bannerEl)return;
    bannerEl.style.transform='translateX(-50%) translateY(130px)';
    setTimeout(()=>{bannerEl&&bannerEl.remove();bannerEl=null;},400);
    localStorage.setItem('mm_pwa_dismissed','1');
  }
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();deferredPrompt=e;
    setTimeout(()=>{
      makeBanner(`<span style="font-size:26px;flex-shrink:0">📲</span><div style="flex:1;line-height:1.4"><div style="font-weight:700;margin-bottom:2px">Installa MyMeal</div><div style="font-size:12px;opacity:.7">Accesso rapido dalla schermata home, funziona offline</div></div><button onclick="(function(){if(!window._dp)return;window._dp.prompt();window._dp.userChoice.then(r=>{if(r.outcome==='accepted'){localStorage.setItem('mm_pwa_dismissed','1');document.querySelector('#pwa-x').click();}window._dp=null;})})()" style="background:#E8A87C;color:#2C2A27;border:none;border-radius:12px;padding:8px 14px;font-weight:700;font-family:Jost,sans-serif;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0">Installa</button><button id="pwa-x" style="background:rgba(255,255,255,0.12);color:#fff;border:none;border-radius:10px;width:28px;height:28px;cursor:pointer;font-size:14px;flex-shrink:0">✕</button>`);
      window._dp=deferredPrompt;
    },2500);
  });
  window.addEventListener('appinstalled',dismiss);
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone=window.navigator.standalone||window.matchMedia('(display-mode:standalone)').matches;
  if(isIOS&&!isStandalone){
    setTimeout(()=>{
      makeBanner(`<span style="font-size:22px;flex-shrink:0">📲</span><div style="flex:1;line-height:1.5;font-size:13px"><strong style="font-size:14px">Installa MyMeal</strong><br>Tocca <span style="background:rgba(255,255,255,0.15);border-radius:5px;padding:1px 6px">⎙ Condividi</span> poi <em>"Aggiungi a schermata Home"</em></div><button id="pwa-x" style="background:rgba(255,255,255,0.12);color:#fff;border:none;border-radius:10px;width:28px;height:28px;cursor:pointer;font-size:14px;flex-shrink:0">✕</button>`);
    },2500);
  }
})();
</script>
